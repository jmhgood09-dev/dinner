<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 저녁 뭐 먹지?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: #a0aec0;
      margin-top: 8px;
      font-size: 1rem;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 24px auto;
      max-width: 700px;
    }

    .filter-btn {
      padding: 8px 20px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #cbd5e0;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    .spin-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin: 10px 0 30px;
    }

    .spin-btn {
      padding: 16px 48px;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #e94560, #f5a623);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(233,69,96,0.4);
    }

    .spin-btn:hover { transform: scale(1.05); box-shadow: 0 6px 32px rgba(233,69,96,0.6); }
    .spin-btn:active { transform: scale(0.97); }

    .result-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 32px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(10px);
      transition: opacity 0.3s, transform 0.3s;
    }

    .result-card.hidden { opacity: 0; transform: translateY(10px); pointer-events: none; }
    .result-card.visible { opacity: 1; transform: translateY(0); }

    .result-emoji { font-size: 3.5rem; }

    .result-name {
      font-size: 2rem;
      font-weight: 700;
      margin: 12px 0 6px;
    }

    .result-category {
      font-size: 0.85rem;
      color: #f5a623;
      background: rgba(245,166,35,0.15);
      padding: 3px 12px;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 12px;
    }

    .result-desc {
      font-size: 0.95rem;
      color: #a0aec0;
      line-height: 1.6;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      max-width: 900px;
      margin: 0 auto 60px;
      padding: 0 10px;
    }

    .menu-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 18px 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .menu-card:hover {
      background: rgba(233,69,96,0.15);
      border-color: rgba(233,69,96,0.4);
      transform: translateY(-3px);
    }

    .menu-card .emoji { font-size: 2rem; }
    .menu-card .name { font-size: 1rem; font-weight: 600; margin-top: 8px; }
    .menu-card .tag {
      font-size: 0.75rem;
      color: #718096;
      margin-top: 4px;
    }

    .section-title {
      text-align: center;
      font-size: 1.1rem;
      color: #a0aec0;
      margin: 20px 0 16px;
      letter-spacing: 0.5px;
    }

    footer {
      text-align: center;
      color: #4a5568;
      font-size: 0.8rem;
      padding-bottom: 30px;
    }

    @keyframes spin {
      0% { transform: rotateY(0deg) scale(1.1); }
      100% { transform: rotateY(360deg) scale(1.1); }
    }
    .spinning .result-emoji { display: inline-block; animation: spin 0.5s linear 3; }
  </style>
</head>
<body>

<header>
  <h1>오늘 저녁 뭐 먹지?</h1>
  <p>고르기 귀찮을 땐 저한테 맡기세요</p>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-cat="전체">전체</button>
  <button class="filter-btn" data-cat="한식">한식</button>
  <button class="filter-btn" data-cat="중식">중식</button>
  <button class="filter-btn" data-cat="일식">일식</button>
  <button class="filter-btn" data-cat="양식">양식</button>
  <button class="filter-btn" data-cat="분식">분식</button>
  <button class="filter-btn" data-cat="패스트푸드">패스트푸드</button>
</div>

<div class="spin-section">
  <button class="spin-btn" id="spinBtn">랜덤 추천 받기</button>
  <div class="result-card hidden" id="resultCard">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-category" id="resultCategory"></div>
    <div class="result-desc" id="resultDesc"></div>
  </div>
</div>

<p class="section-title">전체 메뉴 목록 — 클릭하면 바로 추천!</p>
<div class="menu-grid" id="menuGrid"></div>

<footer>맛있는 저녁 드세요 :)</footer>

<script>
  const menus = [
    { name: "삼겹살", cat: "한식", emoji: "🥩", desc: "불 위에서 노릇하게 구운 삼겹살. 쌈과 함께 먹으면 최고!" },
    { name: "된장찌개", cat: "한식", emoji: "🍲", desc: "구수한 된장 베이스에 두부와 채소가 가득한 집밥의 정석." },
    { name: "비빔밥", cat: "한식", emoji: "🍚", desc: "신선한 나물과 고추장, 달걀 프라이가 올라간 영양 만점 한 그릇." },
    { name: "제육볶음", cat: "한식", emoji: "🌶️", desc: "매콤달콤한 고추장 양념으로 볶은 돼지고기. 밥 도둑!" },
    { name: "부대찌개", cat: "한식", emoji: "🫕", desc: "햄, 소시지, 라면이 들어간 풍성한 찌개. 시원하게 끓여서 먹자." },
    { name: "갈비탕", cat: "한식", emoji: "🍖", desc: "진한 사골 국물에 소갈비가 푹 익은 보양식." },
    { name: "순두부찌개", cat: "한식", emoji: "🫙", desc: "부드러운 순두부와 매운 국물의 완벽한 조화." },
    { name: "자장면", cat: "중식", emoji: "🍜", desc: "춘장 소스에 양파와 돼지고기가 듬뿍. 배달의 클래식." },
    { name: "짬뽕", cat: "중식", emoji: "🌊", desc: "해물과 채소가 가득한 빨간 국물 면 요리." },
    { name: "탕수육", cat: "중식", emoji: "🥡", desc: "바삭하게 튀긴 고기에 새콤달콤한 소스. 부먹? 찍먹?" },
    { name: "마파두부", cat: "중식", emoji: "🧆", desc: "얼얼하게 매운 사천식 두부 요리. 밥에 얹어 먹으면 꿀맛." },
    { name: "초밥", cat: "일식", emoji: "🍣", desc: "신선한 생선과 밥의 조화. 다양한 종류로 즐기자." },
    { name: "라멘", cat: "일식", emoji: "🍥", desc: "진한 육수에 쫄깃한 면발, 차슈까지. 든든한 한 끼." },
    { name: "돈가스", cat: "일식", emoji: "🍱", desc: "바삭한 빵가루 옷을 입은 두꺼운 돼지고기 커틀릿." },
    { name: "우동", cat: "일식", emoji: "🍢", desc: "굵고 쫄깃한 면발에 맑은 국물. 속이 편안해지는 맛." },
    { name: "파스타", cat: "양식", emoji: "🍝", desc: "알리오 올리오, 까르보나라, 봉골레 — 취향대로 선택." },
    { name: "피자", cat: "양식", emoji: "🍕", desc: "쫄깃한 도우에 치즈가 가득. 나눠 먹으면 더 맛있어." },
    { name: "스테이크", cat: "양식", emoji: "🥩", desc: "미디엄 레어로 구운 부드러운 소고기. 오늘만큼은 특별하게." },
    { name: "리조또", cat: "양식", emoji: "🫘", desc: "크림 또는 토마토 베이스로 만든 이탈리안 쌀 요리." },
    { name: "떡볶이", cat: "분식", emoji: "🍢", desc: "쫄깃한 떡과 매콤달콤한 고추장 소스의 국민 간식." },
    { name: "순대국밥", cat: "분식", emoji: "🥣", desc: "뽀얀 국물에 순대와 내장이 가득. 든든한 서민 음식." },
    { name: "김밥", cat: "분식", emoji: "🌯", desc: "참기름 향 가득한 밥에 다양한 재료가 들어간 한 줄." },
    { name: "라면", cat: "분식", emoji: "🍜", desc: "라면도 맛있는 저녁 식사. 계란 하나 추가는 필수." },
    { name: "햄버거", cat: "패스트푸드", emoji: "🍔", desc: "두꺼운 패티와 신선한 채소, 소스가 들어간 간편한 식사." },
    { name: "치킨", cat: "패스트푸드", emoji: "🍗", desc: "바삭하게 튀긴 프라이드, 아니면 매콤한 양념치킨?" },
    { name: "타코", cat: "패스트푸드", emoji: "🌮", desc: "또르띠야에 고기와 채소, 살사 소스가 가득." },
  ];

  let activeFilter = "전체";

  function filtered() {
    return activeFilter === "전체" ? menus : menus.filter(m => m.cat === activeFilter);
  }

  function renderGrid() {
    const grid = document.getElementById("menuGrid");
    grid.innerHTML = "";
    filtered().forEach(menu => {
      const card = document.createElement("div");
      card.className = "menu-card";
      card.innerHTML = `<div class="emoji">${menu.emoji}</div><div class="name">${menu.name}</div><div class="tag">${menu.cat}</div>`;
      card.addEventListener("click", () => showResult(menu));
      grid.appendChild(card);
    });
  }

  function showResult(menu, animate = false) {
    const card = document.getElementById("resultCard");
    const emojiEl = document.getElementById("resultEmoji");

    document.getElementById("resultEmoji").textContent = menu.emoji;
    document.getElementById("resultName").textContent = menu.name;
    document.getElementById("resultCategory").textContent = menu.cat;
    document.getElementById("resultDesc").textContent = menu.desc;

    card.classList.remove("hidden");
    card.classList.add("visible");

    if (animate) {
      card.classList.add("spinning");
      setTimeout(() => card.classList.remove("spinning"), 1600);
    }

    card.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  document.getElementById("spinBtn").addEventListener("click", () => {
    const list = filtered();
    const pick = list[Math.floor(Math.random() * list.length)];
    showResult(pick, true);
  });

  document.getElementById("filters").addEventListener("click", e => {
    if (!e.target.dataset.cat) return;
    activeFilter = e.target.dataset.cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    renderGrid();
  });

  renderGrid();
</script>
</body>
</html>
