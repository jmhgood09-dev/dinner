<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 저녁 뭐 먹지?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    header { text-align: center; padding: 40px 20px 20px; }
    header h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { color: #a0aec0; margin-top: 8px; font-size: 1rem; }

    .filters {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 10px; margin: 24px auto; max-width: 700px;
    }
    .filter-btn {
      padding: 8px 20px; border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05); color: #cbd5e0;
      cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #e94560; border-color: #e94560; color: #fff;
    }

    .spin-section {
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; margin: 10px 0 30px;
    }
    .spin-btn {
      padding: 16px 48px; font-size: 1.2rem; font-weight: 700;
      border: none; border-radius: 999px;
      background: linear-gradient(90deg, #e94560, #f5a623);
      color: #fff; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(233,69,96,0.4);
    }
    .spin-btn:hover  { transform: scale(1.05); box-shadow: 0 6px 32px rgba(233,69,96,0.6); }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .result-card {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 32px 40px; text-align: center;
      max-width: 420px; width: 100%; backdrop-filter: blur(10px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .result-card.hidden  { opacity: 0; transform: translateY(10px); pointer-events: none; }
    .result-card.visible { opacity: 1; transform: translateY(0); }
    .result-emoji { font-size: 3.5rem; }
    .result-name  { font-size: 2rem; font-weight: 700; margin: 12px 0 6px; }
    .result-category {
      font-size: 0.85rem; color: #f5a623;
      background: rgba(245,166,35,0.15); padding: 3px 12px;
      border-radius: 999px; display: inline-block; margin-bottom: 12px;
    }
    .result-desc { font-size: 0.95rem; color: #a0aec0; line-height: 1.6; }

    .menu-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px; max-width: 900px; margin: 0 auto 60px; padding: 0 10px;
    }
    .menu-card {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 18px 16px; cursor: pointer;
      transition: all 0.2s; text-align: center;
    }
    .menu-card:hover {
      background: rgba(233,69,96,0.15); border-color: rgba(233,69,96,0.4);
      transform: translateY(-3px);
    }
    .menu-card .emoji { font-size: 2rem; }
    .menu-card .name  { font-size: 1rem; font-weight: 600; margin-top: 8px; }
    .menu-card .tag   { font-size: 0.75rem; color: #718096; margin-top: 4px; }

    .section-title {
      text-align: center; font-size: 1.1rem; color: #a0aec0;
      margin: 20px 0 16px; letter-spacing: 0.5px;
    }
    footer { text-align: center; color: #4a5568; font-size: 0.8rem; padding-bottom: 30px; }

    /* ===== RONALDO OVERLAY ===== */
    .ro-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.93);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .ro-overlay.active { opacity: 1; pointer-events: all; }

    .ro-spotlight {
      position: absolute; width: 340px; height: 340px;
      background: radial-gradient(ellipse, rgba(255,220,50,0.13) 0%, transparent 70%);
      border-radius: 50%; top: 50%; left: 50%;
      transform: translate(-50%, -58%);
      pointer-events: none;
    }

    /* Stage */
    .ro-stage {
      position: relative; width: 320px; height: 200px;
    }
    .ro-ground {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      border-radius: 2px;
    }

    /* ===== CSS CHARACTER ===== */
    .ro-figure {
      position: absolute; bottom: 3px; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 160px;
    }

    /* Head */
    .ro-head {
      position: absolute; top: 0; left: 25px;
      width: 30px; height: 30px;
      background: #f5c5a3; border-radius: 50%; z-index: 2;
    }
    .ro-hair {
      position: absolute; top: 0; left: 0;
      width: 30px; height: 13px;
      background: #2a1a0e; border-radius: 15px 15px 0 0;
    }

    /* Jersey */
    .ro-jersey {
      position: absolute; top: 28px; left: 22px;
      width: 36px; height: 42px;
      background: #c8102e; border-radius: 4px 4px 0 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; font-weight: 900;
      letter-spacing: -1px; z-index: 1;
    }

    /* Arms */
    .ro-arm {
      position: absolute; top: 30px;
      width: 11px; height: 38px;
      background: #f5c5a3; border-radius: 6px;
      transform-origin: 50% 0%;
      z-index: 0;
    }
    .ro-arm-l { left: 9px; }
    .ro-arm-r { right: 9px; }

    /* Shorts */
    .ro-shorts {
      position: absolute; top: 68px; left: 22px;
      width: 36px; height: 22px;
      background: #006b3f; z-index: 1;
    }

    /* Legs */
    .ro-leg {
      position: absolute; top: 88px;
      width: 13px; height: 52px;
      background: #f5f5f5; border-radius: 3px;
      transform-origin: 50% 0%; z-index: 1;
    }
    .ro-leg-l { left: 22px; }
    .ro-leg-r { right: 22px; }

    /* Shoes */
    .ro-shoe {
      position: absolute; bottom: -6px;
      width: 18px; height: 10px;
      background: #111; border-radius: 4px;
    }
    .ro-shoe-l { left: -3px; }
    .ro-shoe-r { right: -3px; }

    /* ===== PHASE: RUNNING ===== */
    .ro-figure.running {
      animation: ro-slide-in 0.85s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    .ro-figure.running .ro-arm-l { animation: ro-arm-l 0.22s ease-in-out infinite; }
    .ro-figure.running .ro-arm-r { animation: ro-arm-r 0.22s ease-in-out infinite; }
    .ro-figure.running .ro-leg-l { animation: ro-leg-l 0.22s ease-in-out infinite; }
    .ro-figure.running .ro-leg-r { animation: ro-leg-r 0.22s ease-in-out infinite; }

    @keyframes ro-slide-in {
      from { transform: translateX(-260px); }
      to   { transform: translateX(-50%); }
    }
    @keyframes ro-arm-l { 0%,100%{transform:rotate(-32deg)}50%{transform:rotate(32deg)} }
    @keyframes ro-arm-r { 0%,100%{transform:rotate(32deg)} 50%{transform:rotate(-32deg)} }
    @keyframes ro-leg-l { 0%,100%{transform:rotate(-28deg)}50%{transform:rotate(28deg)} }
    @keyframes ro-leg-r { 0%,100%{transform:rotate(28deg)} 50%{transform:rotate(-28deg)} }

    /* ===== PHASE: JUMPING (360° spin) ===== */
    .ro-figure.jumping {
      animation: ro-jump 1.0s cubic-bezier(0.33, 0, 0.66, 1) forwards;
      transform: translateX(-50%);
    }
    .ro-figure.jumping .ro-arm-l { transform: rotate(-80deg); transition: transform 0.18s; }
    .ro-figure.jumping .ro-arm-r { transform: rotate(80deg);  transition: transform 0.18s; }
    .ro-figure.jumping .ro-leg-l { transform: rotate(-22deg); transition: transform 0.18s; }
    .ro-figure.jumping .ro-leg-r { transform: rotate(22deg);  transition: transform 0.18s; }

    @keyframes ro-jump {
      0%   { transform: translateX(-50%) translateY(0)     rotate(0deg);   }
      35%  { transform: translateX(-50%) translateY(-140px) rotate(150deg); }
      65%  { transform: translateX(-50%) translateY(-140px) rotate(300deg); }
      100% { transform: translateX(-50%) translateY(0)     rotate(360deg); }
    }

    /* ===== PHASE: POSING (SIUU pose) ===== */
    .ro-figure.posing {
      animation: ro-land 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    /* Arms spread wide horizontally — the iconic SIUU pose */
    .ro-figure.posing .ro-arm-l { transform: rotate(-90deg); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .ro-figure.posing .ro-arm-r { transform: rotate(90deg);  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .ro-figure.posing .ro-leg-l { transform: rotate(-20deg); transition: transform 0.4s; }
    .ro-figure.posing .ro-leg-r { transform: rotate(20deg);  transition: transform 0.4s; }

    @keyframes ro-land {
      0%   { transform: translateX(-50%) translateY(-25px) rotate(360deg); }
      55%  { transform: translateX(-50%) translateY(10px)  rotate(360deg); }
      100% { transform: translateX(-50%) translateY(0)     rotate(360deg); }
    }

    /* ===== SIUUU! TEXT ===== */
    .ro-siuuu {
      font-size: 5rem; font-weight: 900;
      color: #f5a623;
      text-shadow: 0 0 24px rgba(245,166,35,0.9), 0 0 70px rgba(245,166,35,0.35), 3px 3px 0 rgba(0,0,0,0.5);
      transform: scale(0) rotate(-6deg);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 6px; user-select: none;
      margin-top: 16px;
    }
    .ro-siuuu.show { transform: scale(1) rotate(-6deg); }

    /* ===== STARS ===== */
    .ro-star {
      position: absolute; font-size: 1.5rem;
      opacity: 0; pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    @keyframes ro-burst {
      0%   { transform: translate(-50%,-50%) translate(0,0) scale(0); opacity: 1; }
      60%  { opacity: 1; }
      100% { transform: translate(-50%,-50%) translate(var(--tx), var(--ty)) scale(1.1); opacity: 0; }
    }
    .ro-star.burst { animation: ro-burst 0.75s ease-out forwards; }
  </style>
</head>
<body>

<!-- RONALDO OVERLAY -->
<div id="roOverlay" class="ro-overlay">
  <div class="ro-spotlight"></div>
  <div class="ro-stage">
    <div id="roFigure" class="ro-figure">
      <div class="ro-head"><div class="ro-hair"></div></div>
      <div class="ro-jersey">7</div>
      <div class="ro-arm ro-arm-l"></div>
      <div class="ro-arm ro-arm-r"></div>
      <div class="ro-shorts"></div>
      <div class="ro-leg ro-leg-l"><div class="ro-shoe ro-shoe-l"></div></div>
      <div class="ro-leg ro-leg-r"><div class="ro-shoe ro-shoe-r"></div></div>
    </div>
    <div class="ro-ground"></div>
  </div>
  <div id="roSiuuu" class="ro-siuuu">SIUUU!</div>
</div>

<header>
  <h1>오늘 저녁 뭐 먹지?</h1>
  <p>고르기 귀찮을 땐 저한테 맡기세요</p>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-cat="전체">전체</button>
  <button class="filter-btn" data-cat="한식">한식</button>
  <button class="filter-btn" data-cat="중식">중식</button>
  <button class="filter-btn" data-cat="일식">일식</button>
  <button class="filter-btn" data-cat="양식">양식</button>
  <button class="filter-btn" data-cat="분식">분식</button>
  <button class="filter-btn" data-cat="패스트푸드">패스트푸드</button>
</div>

<div class="spin-section">
  <button class="spin-btn" id="spinBtn">랜덤 추천 받기</button>
  <div class="result-card hidden" id="resultCard">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-name"  id="resultName"></div>
    <div class="result-category" id="resultCategory"></div>
    <div class="result-desc"  id="resultDesc"></div>
  </div>
</div>

<p class="section-title">전체 메뉴 목록 — 클릭하면 바로 추천!</p>
<div class="menu-grid" id="menuGrid"></div>

<footer>맛있는 저녁 드세요 :)</footer>

<script>
  const menus = [
    { name: "삼겹살",   cat: "한식", emoji: "🥩", desc: "불 위에서 노릇하게 구운 삼겹살. 쌈과 함께 먹으면 최고!" },
    { name: "된장찌개", cat: "한식", emoji: "🍲", desc: "구수한 된장 베이스에 두부와 채소가 가득한 집밥의 정석." },
    { name: "비빔밥",   cat: "한식", emoji: "🍚", desc: "신선한 나물과 고추장, 달걀 프라이가 올라간 영양 만점 한 그릇." },
    { name: "제육볶음", cat: "한식", emoji: "🌶️", desc: "매콤달콤한 고추장 양념으로 볶은 돼지고기. 밥 도둑!" },
    { name: "부대찌개", cat: "한식", emoji: "🫕", desc: "햄, 소시지, 라면이 들어간 풍성한 찌개. 시원하게 끓여서 먹자." },
    { name: "갈비탕",   cat: "한식", emoji: "🍖", desc: "진한 사골 국물에 소갈비가 푹 익은 보양식." },
    { name: "순두부찌개", cat: "한식", emoji: "🫙", desc: "부드러운 순두부와 매운 국물의 완벽한 조화." },
    { name: "자장면",   cat: "중식", emoji: "🍜", desc: "춘장 소스에 양파와 돼지고기가 듬뿍. 배달의 클래식." },
    { name: "짬뽕",     cat: "중식", emoji: "🌊", desc: "해물과 채소가 가득한 빨간 국물 면 요리." },
    { name: "탕수육",   cat: "중식", emoji: "🥡", desc: "바삭하게 튀긴 고기에 새콤달콤한 소스. 부먹? 찍먹?" },
    { name: "마파두부", cat: "중식", emoji: "🧆", desc: "얼얼하게 매운 사천식 두부 요리. 밥에 얹어 먹으면 꿀맛." },
    { name: "초밥",     cat: "일식", emoji: "🍣", desc: "신선한 생선과 밥의 조화. 다양한 종류로 즐기자." },
    { name: "라멘",     cat: "일식", emoji: "🍥", desc: "진한 육수에 쫄깃한 면발, 차슈까지. 든든한 한 끼." },
    { name: "돈가스",   cat: "일식", emoji: "🍱", desc: "바삭한 빵가루 옷을 입은 두꺼운 돼지고기 커틀릿." },
    { name: "우동",     cat: "일식", emoji: "🍢", desc: "굵고 쫄깃한 면발에 맑은 국물. 속이 편안해지는 맛." },
    { name: "파스타",   cat: "양식", emoji: "🍝", desc: "알리오 올리오, 까르보나라, 봉골레 — 취향대로 선택." },
    { name: "피자",     cat: "양식", emoji: "🍕", desc: "쫄깃한 도우에 치즈가 가득. 나눠 먹으면 더 맛있어." },
    { name: "스테이크", cat: "양식", emoji: "🥩", desc: "미디엄 레어로 구운 부드러운 소고기. 오늘만큼은 특별하게." },
    { name: "리조또",   cat: "양식", emoji: "🫘", desc: "크림 또는 토마토 베이스로 만든 이탈리안 쌀 요리." },
    { name: "떡볶이",   cat: "분식", emoji: "🍢", desc: "쫄깃한 떡과 매콤달콤한 고추장 소스의 국민 간식." },
    { name: "순대국밥", cat: "분식", emoji: "🥣", desc: "뽀얀 국물에 순대와 내장이 가득. 든든한 서민 음식." },
    { name: "김밥",     cat: "분식", emoji: "🌯", desc: "참기름 향 가득한 밥에 다양한 재료가 들어간 한 줄." },
    { name: "라면",     cat: "분식", emoji: "🍜", desc: "라면도 맛있는 저녁 식사. 계란 하나 추가는 필수." },
    { name: "햄버거",   cat: "패스트푸드", emoji: "🍔", desc: "두꺼운 패티와 신선한 채소, 소스가 들어간 간편한 식사." },
    { name: "치킨",     cat: "패스트푸드", emoji: "🍗", desc: "바삭하게 튀긴 프라이드, 아니면 매콤한 양념치킨?" },
    { name: "타코",     cat: "패스트푸드", emoji: "🌮", desc: "또르띠야에 고기와 채소, 살사 소스가 가득." },
  ];

  let activeFilter = "전체";
  let isAnimating = false;

  function filtered() {
    return activeFilter === "전체" ? menus : menus.filter(m => m.cat === activeFilter);
  }

  function renderGrid() {
    const grid = document.getElementById("menuGrid");
    grid.innerHTML = "";
    filtered().forEach(menu => {
      const card = document.createElement("div");
      card.className = "menu-card";
      card.innerHTML = `<div class="emoji">${menu.emoji}</div><div class="name">${menu.name}</div><div class="tag">${menu.cat}</div>`;
      card.addEventListener("click", () => showResult(menu));
      grid.appendChild(card);
    });
  }

  function showResult(menu) {
    const card = document.getElementById("resultCard");
    document.getElementById("resultEmoji").textContent    = menu.emoji;
    document.getElementById("resultName").textContent     = menu.name;
    document.getElementById("resultCategory").textContent = menu.cat;
    document.getElementById("resultDesc").textContent     = menu.desc;
    card.classList.remove("hidden");
    card.classList.add("visible");
    card.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  /* ===== RONALDO ANIMATION ===== */
  function spawnStars() {
    const overlay = document.getElementById("roOverlay");
    const emojis = ["⭐","✨","🌟","💫","🎉","🏆","🔥","👑"];
    for (let i = 0; i < 14; i++) {
      const el = document.createElement("div");
      el.className = "ro-star";
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const angle = (i / 14) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
      const dist  = 80 + Math.random() * 90;
      el.style.setProperty("--tx", (Math.cos(angle) * dist) + "px");
      el.style.setProperty("--ty", (Math.sin(angle) * dist) + "px");
      overlay.appendChild(el);
      setTimeout(() => el.classList.add("burst"), 30);
      setTimeout(() => el.remove(), 850);
    }
  }

  function runRonaldo(callback) {
    if (isAnimating) return;
    isAnimating = true;
    document.getElementById("spinBtn").disabled = true;

    const overlay = document.getElementById("roOverlay");
    const figure  = document.getElementById("roFigure");
    const siuuu   = document.getElementById("roSiuuu");

    // Reset
    figure.className = "ro-figure";
    siuuu.classList.remove("show");
    overlay.classList.add("active");

    // Phase 1: Run in (100ms delay for overlay fade)
    setTimeout(() => figure.classList.add("running"), 100);

    // Phase 2: Jump (after running in)
    setTimeout(() => {
      figure.classList.remove("running");
      figure.classList.add("jumping");
    }, 950);

    // Phase 3: Land in SIUU pose
    setTimeout(() => {
      figure.classList.remove("jumping");
      figure.classList.add("posing");
    }, 2050);

    // Phase 4: SIUUU! + stars
    setTimeout(() => {
      siuuu.classList.add("show");
      spawnStars();
    }, 2280);

    // Phase 5: Fade out overlay, show result
    setTimeout(() => {
      overlay.classList.remove("active");
      setTimeout(() => {
        callback();
        isAnimating = false;
        document.getElementById("spinBtn").disabled = false;
      }, 350);
    }, 3500);
  }

  document.getElementById("spinBtn").addEventListener("click", () => {
    const list = filtered();
    const pick = list[Math.floor(Math.random() * list.length)];
    runRonaldo(() => showResult(pick));
  });

  document.getElementById("filters").addEventListener("click", e => {
    if (!e.target.dataset.cat) return;
    activeFilter = e.target.dataset.cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    renderGrid();
  });

  renderGrid();
</script>
</body>
</html>
