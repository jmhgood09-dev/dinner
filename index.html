<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 저녁 뭐 먹지? 🍽️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    header { text-align: center; padding: 40px 20px 20px; }
    header h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { color: #a0aec0; margin-top: 8px; font-size: 1rem; }

    .filters {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 10px; margin: 24px auto; max-width: 700px;
    }
    .filter-btn {
      padding: 8px 20px; border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05); color: #cbd5e0;
      cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #e94560; border-color: #e94560; color: #fff;
    }

    .spin-section {
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; margin: 10px 0 30px;
    }
    .spin-btn {
      padding: 16px 48px; font-size: 1.2rem; font-weight: 700;
      border: none; border-radius: 999px;
      background: linear-gradient(90deg, #e94560, #f5a623);
      color: #fff; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(233,69,96,0.4);
    }
    .spin-btn:hover  { transform: scale(1.05); box-shadow: 0 6px 32px rgba(233,69,96,0.6); }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .result-card {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 32px 40px; text-align: center;
      max-width: 420px; width: 100%; backdrop-filter: blur(10px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .result-card.hidden  { opacity: 0; transform: translateY(10px); pointer-events: none; }
    .result-card.visible { opacity: 1; transform: translateY(0); }
    .result-emoji { font-size: 3.5rem; }
    .result-name  { font-size: 2rem; font-weight: 700; margin: 12px 0 6px; }
    .result-category {
      font-size: 0.85rem; color: #f5a623;
      background: rgba(245,166,35,0.15); padding: 3px 12px;
      border-radius: 999px; display: inline-block; margin-bottom: 12px;
    }
    .result-desc { font-size: 0.95rem; color: #a0aec0; line-height: 1.6; }

    .menu-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px; max-width: 900px; margin: 0 auto 60px; padding: 0 10px;
    }
    .menu-card {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 18px 16px; cursor: pointer;
      transition: all 0.2s; text-align: center;
    }
    .menu-card:hover {
      background: rgba(233,69,96,0.15); border-color: rgba(233,69,96,0.4);
      transform: translateY(-3px);
    }
    .menu-card .emoji { font-size: 2rem; }
    .menu-card .name  { font-size: 1rem; font-weight: 600; margin-top: 8px; }
    .menu-card .tag   { font-size: 0.75rem; color: #718096; margin-top: 4px; }

    .section-title {
      text-align: center; font-size: 1.1rem; color: #a0aec0;
      margin: 20px 0 16px; letter-spacing: 0.5px;
    }
    footer { text-align: center; color: #4a5568; font-size: 0.8rem; padding-bottom: 30px; }

    /* ===== CORGI OVERLAY ===== */
    .corgi-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .corgi-overlay.active { opacity: 1; pointer-events: all; }

    .corgi-stage {
      position: relative; width: 380px; height: 160px;
    }
    .corgi-ground {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      border-radius: 2px;
    }

    /* ===== CSS CORGI ===== */
    .corgi-figure {
      position: absolute; bottom: 3px; left: 50%;
      transform: translateX(-50%);
      width: 210px; height: 140px;
    }

    .cg-body {
      position: absolute;
      width: 115px; height: 50px;
      background: #d4883e;
      border-radius: 22px 16px 16px 22px;
      bottom: 22px; left: 18px;
    }
    .cg-belly {
      position: absolute;
      width: 58px; height: 26px;
      background: #f0ddb0;
      border-radius: 50%;
      bottom: 3px; left: 24px;
    }
    .cg-tail {
      position: absolute;
      width: 24px; height: 18px;
      background: #e09e5a;
      border-radius: 50% 30% 50% 30%;
      bottom: 64px; left: 8px;
      transform: rotate(-25deg);
      transform-origin: right center;
    }
    .cg-head {
      position: absolute;
      width: 50px; height: 46px;
      background: #d4883e;
      border-radius: 50% 48% 44% 44%;
      bottom: 58px; left: 118px;
      overflow: visible;
    }
    .cg-ear-l {
      position: absolute;
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 20px solid #b8703a;
      top: -17px; left: 6px;
      transform-origin: bottom center;
    }
    .cg-ear-r {
      position: absolute;
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 23px solid #d4883e;
      top: -20px; right: 3px;
      transform-origin: bottom center;
    }
    .cg-eye {
      position: absolute;
      width: 7px; height: 7px;
      background: #1a1a1a;
      border-radius: 50%;
      top: 10px; right: 9px;
    }
    .cg-eye::after {
      content: '';
      position: absolute;
      width: 3px; height: 3px;
      background: #fff;
      border-radius: 50%;
      top: 1px; left: 1px;
    }
    .cg-snout {
      position: absolute;
      width: 28px; height: 20px;
      background: #c87840;
      border-radius: 35% 55% 55% 35%;
      bottom: 7px; right: -13px;
    }
    .cg-nose {
      position: absolute;
      width: 9px; height: 6px;
      background: #1a1a1a;
      border-radius: 50%;
      top: 3px; right: 4px;
    }
    .cg-tongue {
      position: absolute;
      width: 10px; height: 13px;
      background: #e05070;
      border-radius: 0 0 7px 7px;
      bottom: -9px; left: 8px;
    }

    /* Short stubby legs — the corgi signature */
    .cg-leg {
      position: absolute;
      width: 14px; height: 24px;
      background: #c07838;
      border-radius: 7px 7px 5px 5px;
      transform-origin: top center;
      bottom: 2px;
    }
    .cg-leg-rl { left: 30px; background: #b06828; }
    .cg-leg-rr { left: 44px; }
    .cg-leg-fl { left: 112px; background: #b06828; }
    .cg-leg-fr { left: 126px; }

    /* ===== RUNNING PHASE ===== */
    .corgi-figure.running {
      animation: cg-slide-in 1.0s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
    }
    .corgi-figure.running .cg-leg-fr { animation: cg-leg-a 0.2s ease-in-out infinite; }
    .corgi-figure.running .cg-leg-fl { animation: cg-leg-b 0.2s ease-in-out infinite; }
    .corgi-figure.running .cg-leg-rr { animation: cg-leg-b 0.2s ease-in-out infinite; }
    .corgi-figure.running .cg-leg-rl { animation: cg-leg-a 0.2s ease-in-out infinite; }
    .corgi-figure.running .cg-tail   { animation: cg-tail-run 0.2s ease-in-out infinite; }
    .corgi-figure.running .cg-ear-l  { animation: cg-ear 0.2s ease-in-out infinite; }
    .corgi-figure.running .cg-ear-r  { animation: cg-ear 0.2s ease-in-out infinite; }

    @keyframes cg-slide-in {
      from { transform: translateX(-500px); }
      to   { transform: translateX(-50%); }
    }
    @keyframes cg-leg-a { 0%,100%{transform:rotate(-35deg)} 50%{transform:rotate(35deg)} }
    @keyframes cg-leg-b { 0%,100%{transform:rotate(35deg)}  50%{transform:rotate(-35deg)} }
    @keyframes cg-tail-run { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(30deg)} }
    @keyframes cg-ear { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-14deg)} }

    /* ===== HAPPY PHASE ===== */
    .corgi-figure.happy {
      transform: translateX(-50%);
      animation: cg-happy 0.28s ease-in-out 3;
    }
    .corgi-figure.happy .cg-tail   { animation: cg-tail-wag 0.14s ease-in-out infinite; }
    .corgi-figure.happy .cg-leg-fr { animation: cg-leg-a 0.14s ease-in-out infinite; }
    .corgi-figure.happy .cg-leg-fl { animation: cg-leg-b 0.14s ease-in-out infinite; }
    .corgi-figure.happy .cg-leg-rr { animation: cg-leg-b 0.14s ease-in-out infinite; }
    .corgi-figure.happy .cg-leg-rl { animation: cg-leg-a 0.14s ease-in-out infinite; }

    @keyframes cg-happy {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%     { transform: translateX(-50%) translateY(-14px); }
    }
    @keyframes cg-tail-wag {
      0%,100% { transform: rotate(-40deg); }
      50%     { transform: rotate(40deg); }
    }

    /* ===== WAL TEXT ===== */
    .corgi-wal {
      font-size: 4.5rem; font-weight: 900;
      color: #f5c842;
      text-shadow: 0 0 24px rgba(245,200,66,0.9), 3px 3px 0 rgba(0,0,0,0.5);
      transform: scale(0) rotate(-4deg);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      letter-spacing: 4px; user-select: none;
      margin-top: 16px;
    }
    .corgi-wal.show { transform: scale(1) rotate(-4deg); }

    /* ===== PAW BURST ===== */
    .cg-paw {
      position: absolute; font-size: 1.5rem;
      opacity: 0; pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    @keyframes cg-burst {
      0%   { transform: translate(-50%,-50%) translate(0,0) scale(0); opacity: 1; }
      60%  { opacity: 1; }
      100% { transform: translate(-50%,-50%) translate(var(--tx), var(--ty)) scale(1.1); opacity: 0; }
    }
    .cg-paw.burst { animation: cg-burst 0.75s ease-out forwards; }
  </style>
</head>
<body>

<!-- CORGI OVERLAY -->
<div id="corgiOverlay" class="corgi-overlay">
  <div class="corgi-stage">
    <div id="corgiFigure" class="corgi-figure">
      <div class="cg-tail"></div>
      <div class="cg-body">
        <div class="cg-belly"></div>
      </div>
      <div class="cg-head">
        <div class="cg-ear-l"></div>
        <div class="cg-ear-r"></div>
        <div class="cg-eye"></div>
        <div class="cg-snout">
          <div class="cg-nose"></div>
          <div class="cg-tongue"></div>
        </div>
      </div>
      <div class="cg-leg cg-leg-rl"></div>
      <div class="cg-leg cg-leg-rr"></div>
      <div class="cg-leg cg-leg-fl"></div>
      <div class="cg-leg cg-leg-fr"></div>
    </div>
    <div class="corgi-ground"></div>
  </div>
  <div id="corgiWal" class="corgi-wal">왈왈! 🐾</div>
</div>

<header>
  <h1>오늘 저녁 뭐 먹지?</h1>
  <p>고르기 귀찮을 땐 저한테 맡기세요</p>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-cat="전체">전체</button>
  <button class="filter-btn" data-cat="한식">한식</button>
  <button class="filter-btn" data-cat="중식">중식</button>
  <button class="filter-btn" data-cat="일식">일식</button>
  <button class="filter-btn" data-cat="양식">양식</button>
  <button class="filter-btn" data-cat="분식">분식</button>
  <button class="filter-btn" data-cat="패스트푸드">패스트푸드</button>
</div>

<div class="spin-section">
  <button class="spin-btn" id="spinBtn">랜덤 추천 받기</button>
  <div class="result-card hidden" id="resultCard">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-name"  id="resultName"></div>
    <div class="result-category" id="resultCategory"></div>
    <div class="result-desc"  id="resultDesc"></div>
  </div>
</div>

<p class="section-title">전체 메뉴 목록 — 클릭하면 바로 추천!</p>
<div class="menu-grid" id="menuGrid"></div>

<footer>맛있는 저녁 드세요 :)</footer>

<script>
  const menus = [
    { name: "삼겹살",     cat: "한식", emoji: "🥩", desc: "불 위에서 노릇하게 구운 삼겹살. 쌈과 함께 먹으면 최고!" },
    { name: "된장찌개",   cat: "한식", emoji: "🍲", desc: "구수한 된장 베이스에 두부와 채소가 가득한 집밥의 정석." },
    { name: "비빔밥",     cat: "한식", emoji: "🍚", desc: "신선한 나물과 고추장, 달걀 프라이가 올라간 영양 만점 한 그릇." },
    { name: "제육볶음",   cat: "한식", emoji: "🌶️", desc: "매콤달콤한 고추장 양념으로 볶은 돼지고기. 밥 도둑!" },
    { name: "부대찌개",   cat: "한식", emoji: "🫕", desc: "햄, 소시지, 라면이 들어간 풍성한 찌개. 시원하게 끓여서 먹자." },
    { name: "갈비탕",     cat: "한식", emoji: "🍖", desc: "진한 사골 국물에 소갈비가 푹 익은 보양식." },
    { name: "순두부찌개", cat: "한식", emoji: "🫙", desc: "부드러운 순두부와 매운 국물의 완벽한 조화." },
    { name: "밀면",       cat: "한식", emoji: "🍜", desc: "부산식 냉면. 밀가루 면발에 시원하고 담백한 육수를 부어 먹는 여름 별미." },
    { name: "자장면",     cat: "중식", emoji: "🍜", desc: "춘장 소스에 양파와 돼지고기가 듬뿍. 배달의 클래식." },
    { name: "짬뽕",       cat: "중식", emoji: "🌊", desc: "해물과 채소가 가득한 빨간 국물 면 요리." },
    { name: "탕수육",     cat: "중식", emoji: "🥡", desc: "바삭하게 튀긴 고기에 새콤달콤한 소스. 부먹? 찍먹?" },
    { name: "마파두부",   cat: "중식", emoji: "🧆", desc: "얼얼하게 매운 사천식 두부 요리. 밥에 얹어 먹으면 꿀맛." },
    { name: "마라탕",     cat: "중식", emoji: "🥘", desc: "얼얼한 마라 육수에 원하는 재료를 골라 넣는 중국식 탕. 중독성 있는 맛!" },
    { name: "초밥",       cat: "일식", emoji: "🍣", desc: "신선한 생선과 밥의 조화. 다양한 종류로 즐기자." },
    { name: "라멘",       cat: "일식", emoji: "🍥", desc: "진한 육수에 쫄깃한 면발, 차슈까지. 든든한 한 끼." },
    { name: "돈가스",     cat: "일식", emoji: "🍱", desc: "바삭한 빵가루 옷을 입은 두꺼운 돼지고기 커틀릿." },
    { name: "우동",       cat: "일식", emoji: "🍢", desc: "굵고 쫄깃한 면발에 맑은 국물. 속이 편안해지는 맛." },
    { name: "파스타",     cat: "양식", emoji: "🍝", desc: "알리오 올리오, 까르보나라, 봉골레 — 취향대로 선택." },
    { name: "피자",       cat: "양식", emoji: "🍕", desc: "쫄깃한 도우에 치즈가 가득. 나눠 먹으면 더 맛있어." },
    { name: "스테이크",   cat: "양식", emoji: "🥩", desc: "미디엄 레어로 구운 부드러운 소고기. 오늘만큼은 특별하게." },
    { name: "리조또",     cat: "양식", emoji: "🫘", desc: "크림 또는 토마토 베이스로 만든 이탈리안 쌀 요리." },
    { name: "떡볶이",     cat: "분식", emoji: "🍢", desc: "쫄깃한 떡과 매콤달콤한 고추장 소스의 국민 간식." },
    { name: "순대국밥",   cat: "분식", emoji: "🥣", desc: "뽀얀 국물에 순대와 내장이 가득. 든든한 서민 음식." },
    { name: "김밥",       cat: "분식", emoji: "🌯", desc: "참기름 향 가득한 밥에 다양한 재료가 들어간 한 줄." },
    { name: "라면",       cat: "분식", emoji: "🍜", desc: "라면도 맛있는 저녁 식사. 계란 하나 추가는 필수." },
    { name: "햄버거",     cat: "패스트푸드", emoji: "🍔", desc: "두꺼운 패티와 신선한 채소, 소스가 들어간 간편한 식사." },
    { name: "치킨",       cat: "패스트푸드", emoji: "🍗", desc: "바삭하게 튀긴 프라이드, 아니면 매콤한 양념치킨?" },
    { name: "타코",       cat: "패스트푸드", emoji: "🌮", desc: "또르띠야에 고기와 채소, 살사 소스가 가득." },
  ];

  let activeFilter = "전체";
  let isAnimating = false;

  function filtered() {
    return activeFilter === "전체" ? menus : menus.filter(m => m.cat === activeFilter);
  }

  function renderGrid() {
    const grid = document.getElementById("menuGrid");
    grid.innerHTML = "";
    filtered().forEach(menu => {
      const card = document.createElement("div");
      card.className = "menu-card";
      card.innerHTML = `<div class="emoji">${menu.emoji}</div><div class="name">${menu.name}</div><div class="tag">${menu.cat}</div>`;
      card.addEventListener("click", () => showResult(menu));
      grid.appendChild(card);
    });
  }

  function showResult(menu) {
    const card = document.getElementById("resultCard");
    document.getElementById("resultEmoji").textContent    = menu.emoji;
    document.getElementById("resultName").textContent     = menu.name;
    document.getElementById("resultCategory").textContent = menu.cat;
    document.getElementById("resultDesc").textContent     = menu.desc;
    card.classList.remove("hidden");
    card.classList.add("visible");
    card.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  /* ===== CORGI ANIMATION ===== */
  function spawnPaws() {
    const overlay = document.getElementById("corgiOverlay");
    const items = ["🐾","🦴","🐕","💛","⭐","✨","🌟"];
    for (let i = 0; i < 14; i++) {
      const el = document.createElement("div");
      el.className = "cg-paw";
      el.textContent = items[Math.floor(Math.random() * items.length)];
      const angle = (i / 14) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
      const dist  = 70 + Math.random() * 90;
      el.style.setProperty("--tx", (Math.cos(angle) * dist) + "px");
      el.style.setProperty("--ty", (Math.sin(angle) * dist) + "px");
      overlay.appendChild(el);
      setTimeout(() => el.classList.add("burst"), 30);
      setTimeout(() => el.remove(), 850);
    }
  }

  function runCorgi(callback) {
    if (isAnimating) return;
    isAnimating = true;
    document.getElementById("spinBtn").disabled = true;

    const overlay = document.getElementById("corgiOverlay");
    const figure  = document.getElementById("corgiFigure");
    const wal     = document.getElementById("corgiWal");

    figure.className = "corgi-figure";
    wal.classList.remove("show");
    overlay.classList.add("active");

    // Phase 1: Run in
    setTimeout(() => figure.classList.add("running"), 100);

    // Phase 2: Happy bounce
    setTimeout(() => {
      figure.classList.remove("running");
      figure.classList.add("happy");
    }, 1100);

    // Phase 3: 왈왈! + paw burst
    setTimeout(() => {
      wal.classList.add("show");
      spawnPaws();
    }, 1350);

    // Phase 4: Fade out, show result
    setTimeout(() => {
      overlay.classList.remove("active");
      setTimeout(() => {
        callback();
        isAnimating = false;
        document.getElementById("spinBtn").disabled = false;
      }, 350);
    }, 2800);
  }

  document.getElementById("spinBtn").addEventListener("click", () => {
    const list = filtered();
    const pick = list[Math.floor(Math.random() * list.length)];
    runCorgi(() => showResult(pick));
  });

  document.getElementById("filters").addEventListener("click", e => {
    if (!e.target.dataset.cat) return;
    activeFilter = e.target.dataset.cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    renderGrid();
  });

  renderGrid();
</script>
</body>
</html>
